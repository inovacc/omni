  # ===== SIGN / VERIFY (minisign-compatible, fail-closed) =====
  # Fixtures are pre-generated ONCE at low scrypt cost and committed under
  # testing/golden/fixtures/sign/ — the {fixtures} placeholder expands to that
  # directory. Tests NEVER run live keygen (default SENSITIVE cost is ~1 GiB).
  - name: sign
    tests:
      # Positive: a good detached signature verifies (exit 0).
      - name: verify_good
        args: ["verify", "--key", "{fixtures}/test.pub", "--sig", "{fixtures}/data.txt.minisig", "{fixtures}/data.txt"]
        exit_code: 0
        normalizations: ["strip_path"]

      # Negative: tampered payload -> ErrConflict (exit 1).
      - name: verify_tampered
        args: ["verify", "--key", "{fixtures}/test.pub", "--sig", "{fixtures}/data.txt.minisig", "{fixtures}/tampered.txt"]
        exit_code: 1
        normalizations: ["strip_path"]

      # Negative: signature made by a different key -> ErrConflict (exit 1).
      - name: verify_wrong_key
        args: ["verify", "--key", "{fixtures}/wrong.pub", "--sig", "{fixtures}/data.txt.minisig", "{fixtures}/data.txt"]
        exit_code: 1
        normalizations: ["strip_path"]

      # Negative: malformed public key -> ErrInvalidInput (exit 2).
      - name: verify_bad_key
        args: ["verify", "--key", "{fixtures}/bad.pub", "--sig", "{fixtures}/data.txt.minisig", "{fixtures}/data.txt"]
        exit_code: 2
        normalizations: ["strip_path"]

      # Negative: --bundle without -tags omni_sigstore -> ErrUnsupported (exit 6).
      - name: verify_bundle_no_tag
        args: ["verify", "--bundle", "{fixtures}/data.txt", "{fixtures}/data.txt"]
        exit_code: 6
        normalizations: ["strip_path"]

  # sbom: byte-deterministic SPDX/CycloneDX over a FROZEN module-dir fixture
  # (testing/golden/fixtures/sbom/mod/go.mod). --source-date is pinned to the
  # epoch so the `created` timestamp never drifts; output is pure go.mod-derived
  # JSON (forward-slash purls), so snapshots are cross-platform stable.
  - name: sbom
    tests:
      # SPDX module SBOM pins EXACT bytes (full purls + content-hash namespace).
      # Module-dir output carries no filesystem paths, so no strip_path is needed
      # or applied; newlines are always normalized first by the harness.
      - name: spdx_module
        args: ["sbom", "{fixtures}/mod", "--format", "spdx", "--source-date", "1970-01-01T00:00:00Z"]
        exit_code: 0

      # CycloneDX module SBOM pins exact bytes (full purls, no serialNumber).
      - name: cyclonedx_module
        args: ["sbom", "{fixtures}/mod", "--format", "cyclonedx", "--source-date", "1970-01-01T00:00:00Z"]
        exit_code: 0

      # Negative: unknown format -> ErrInvalidInput (exit 2).
      - name: bad_format
        args: ["sbom", "{fixtures}/mod", "--format", "xml"]
        exit_code: 2
        normalizations: ["strip_path"]

      # Negative: missing path -> ErrNotFound (exit 1).
      - name: missing_path
        args: ["sbom", "{fixtures}/does-not-exist", "--format", "spdx"]
        exit_code: 1
        normalizations: ["strip_path"]

      # Negative: --validate without the omni_sbomvalidate build tag ->
      # ErrUnsupported (exit 6). Fail-closed, never silently passing.
      - name: validate_no_tag
        args: ["sbom", "{fixtures}/mod", "--format", "spdx", "--validate"]
        exit_code: 6
        normalizations: ["strip_path"]

  # scan: matches committed SBOMs against a FROZEN pkg/sign-signed osv-db.zip
  # (manifest.generated pinned to 2026-01-01). renderText is path-free AND
  # age-free (DBAge is --json-only), so POSITIVE outputs pin exact bytes with NO
  # normalization (strip_path would mangle slash-bearing purls like
  # github.com/vuln/pkg). Only path-bearing negatives use strip_path; the
  # stale-DB case normalizes its drifting "generated <age> ago" via strip_db_age.
  - name: scan
    tests:
      # No matching vulns -> exit 0.
      - name: scan_clean
        args: ["scan", "--db", "{fixtures}/osv-db.zip", "--db-key", "{fixtures}/db.pub", "{fixtures}/clean-sbom.json"]
        exit_code: 0

      # One matching vuln, no --fail-on -> exit 0, report on stdout (exact bytes).
      - name: scan_vuln_report
        args: ["scan", "--db", "{fixtures}/osv-db.zip", "--db-key", "{fixtures}/db.pub", "{fixtures}/vuln-sbom.json"]
        exit_code: 0

      # --json pins (2-space indent + trailing newline). db_age drifts (duration
      # since the FROZEN manifest.generated), so it is normalized; everything else
      # is exact. Records before the formatter unification; byte-identical after.
      - name: scan_clean_json
        args: ["scan", "--db", "{fixtures}/osv-db.zip", "--db-key", "{fixtures}/db.pub", "--json", "{fixtures}/clean-sbom.json"]
        exit_code: 0
        normalize:
          - pattern: "\"db_age\": \"[^\"]*\""
            replacement: "\"db_age\": \"<AGE>\""

      - name: scan_vuln_report_json
        args: ["scan", "--db", "{fixtures}/osv-db.zip", "--db-key", "{fixtures}/db.pub", "--json", "{fixtures}/vuln-sbom.json"]
        exit_code: 0
        normalize:
          - pattern: "\"db_age\": \"[^\"]*\""
            replacement: "\"db_age\": \"<AGE>\""

      # CI gating path: a high finding at/above --fail-on -> ErrConflict (exit 1).
      - name: scan_fail_on_high
        args: ["scan", "--db", "{fixtures}/osv-db.zip", "--db-key", "{fixtures}/db.pub", "--fail-on", "high", "{fixtures}/vuln-sbom.json"]
        exit_code: 1

      # Missing SBOM file -> ErrNotFound (exit 1); path in stderr -> strip_path.
      - name: scan_missing_sbom
        args: ["scan", "--db", "{fixtures}/osv-db.zip", "--db-key", "{fixtures}/db.pub", "{fixtures}/does-not-exist.json"]
        exit_code: 1
        normalizations: ["strip_path"]

      # Malformed SBOM -> ErrInvalidInput (exit 2); path in stderr -> strip_path.
      - name: scan_bad_sbom
        args: ["scan", "--db", "{fixtures}/osv-db.zip", "--db-key", "{fixtures}/db.pub", "{fixtures}/bad-sbom.json"]
        exit_code: 2
        normalizations: ["strip_path"]

      # Tampered DB -> signature verification fails closed -> ErrConflict (exit 1).
      - name: scan_tampered_db
        args: ["scan", "--db", "{fixtures}/osv-db.tampered.zip", "--db-key", "{fixtures}/db.pub", "{fixtures}/vuln-sbom.json"]
        exit_code: 1

      # Stale DB over --max-db-age -> fails LOUDLY -> ErrConflict (exit 1).
      - name: scan_stale_db
        args: ["scan", "--db", "{fixtures}/osv-db.zip", "--db-key", "{fixtures}/db.pub", "--max-db-age", "1s", "{fixtures}/vuln-sbom.json"]
        exit_code: 1
        normalizations: ["strip_db_age"]

      # Reachability deferred (ADR-0008) -> ErrUnsupported (exit 6).
      - name: scan_source_unsupported
        args: ["scan", "source", "./..."]
        exit_code: 6

  # attest: verify a committed, deterministically-signed DSSE/SLSA envelope
  # (LOCAL builder.id, no timestamps). Output is path-free; strip_path would
  # mangle the https://slsa.dev/... predicateType, so NO normalization is used —
  # exact bytes are pinned. The SLSA-overclaim refusal is unit-tested (it needs
  # OMNI_SIGN_PASSPHRASE, which the golden harness cannot set per-test).
  - name: attest
    tests:
      # Valid envelope + matching artifact -> exit 0.
      - name: attest_verify_ok
        args: ["attest", "verify", "--key", "{fixtures}/test.pub", "--artifact", "{fixtures}/artifact.bin", "{fixtures}/app.intoto.jsonl"]
        exit_code: 0

      # Tampered payload -> signature no longer verifies -> ErrConflict (exit 1).
      - name: attest_verify_tampered
        args: ["attest", "verify", "--key", "{fixtures}/test.pub", "--artifact", "{fixtures}/artifact.bin", "{fixtures}/tampered.jsonl"]
        exit_code: 1

      # Wrong public key -> ErrConflict (exit 1).
      - name: attest_verify_wrong_key
        args: ["attest", "verify", "--key", "{fixtures}/wrong.pub", "--artifact", "{fixtures}/artifact.bin", "{fixtures}/app.intoto.jsonl"]
        exit_code: 1

      # Envelope that is not JSON -> ErrInvalidInput (exit 2).
      - name: attest_verify_bad_envelope
        args: ["attest", "verify", "--key", "{fixtures}/test.pub", "--artifact", "{fixtures}/artifact.bin", "{fixtures}/artifact.bin"]
        exit_code: 2

      # Unsupported predicate type -> ErrUnsupported (exit 6).
      - name: attest_unsupported_predicate
        args: ["attest", "--predicate-type", "spdx", "--key", "{fixtures}/test.key", "--artifact", "{fixtures}/artifact.bin"]
        exit_code: 6

  # reprocheck: deterministic sha256 digest-pair comparison (the release
  # reproducibility gate). Fixtures are -text-locked (.gitattributes) so hashes are
  # stable on every platform; strip_path normalizes the path token (hash16 is kept).
  - name: reprocheck
    tests:
      # Identical bytes -> reproducible (exit 0); hash16 pinned, path stripped.
      - name: reprocheck_match
        args: ["reprocheck", "--a", "{fixtures}/same-a", "--b", "{fixtures}/same-b"]
        exit_code: 0
        normalizations: ["strip_path"]

      # Differing bytes -> drift -> ErrConflict (exit 1).
      - name: reprocheck_drift
        args: ["reprocheck", "--a", "{fixtures}/diff-a", "--b", "{fixtures}/diff-b"]
        exit_code: 1
        normalizations: ["strip_path"]

      # Unequal/empty A/B lists -> ErrInvalidInput (exit 2).
      - name: reprocheck_bad_args
        args: ["reprocheck", "--a", "{fixtures}/same-a"]
        exit_code: 2

      # Missing B file -> ErrNotFound (exit 1).
      - name: reprocheck_missing
        args: ["reprocheck", "--a", "{fixtures}/same-a", "--b", "{fixtures}/does-not-exist"]
        exit_code: 1
        normalizations: ["strip_path"]
