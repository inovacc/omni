version: 2
updates:
  # Main module — Go dependencies.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build(deps)"
    groups:
      # Batch low-risk bumps into one PR; majors stay individual for review.
      go-minor-patch:
        update-types: ["minor", "patch"]

  # Isolated supply-chain-verification module (kept out of the main go.mod
  # on purpose — see ADR-0007 / contrib/sigstore-verify).
  - package-ecosystem: "gomod"
    directory: "/contrib/sigstore-verify"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)"
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  # Pin/refresh GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
