name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-check:
    uses: inovacc/workflows/.github/workflows/reusable-go-check.yml@main
    with:
      run-tests: true
      run-lint: true
      run-vulncheck: true
      test-timeout: "15m"
      timeout-minutes: 30

  cmderr-coverage-gate:
    name: cmderr coverage gate
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cmderr coverage gate (>=90%)
        run: task lint:cmderr-coverage

      - name: Phase 1 golden smoke
        run: task test:golden -- --filter '_file_not_found|_invalid_|_unsupported|_conflict'

  lint-help:
    name: help docstring lint
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint cobra help strings
        run: task lint:help

  lint-coverage:
    name: coverage gate (pkg/ + internal/cli/)
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run dual-rule coverage gate
        run: task lint:coverage
