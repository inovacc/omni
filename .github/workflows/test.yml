name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Self-contained quality gate. Replaced the external reusable workflow
  # (inovacc/workflows/.../reusable-go-check.yml@main) whose "Set lint result"
  # step failed after lint+gofmt passed, aborting before tests/vulncheck and
  # silently skipping every dependent gate (main was red 0/15 runs).
  quality-check:
    name: quality check (build + vet + lint + test + vuln)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Test
        run: go test ./... -count=1 -timeout 15m

      # Advisory until the reachable Go stdlib / golang.org/x/net CVEs are
      # patched (see docs/quality/MATURITY-2026-06-03.md). Make this blocking
      # (drop continue-on-error) once the toolchain + x/net are bumped.
      - name: govulncheck (advisory)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  cmderr-coverage-gate:
    name: cmderr coverage gate
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cmderr coverage gate (>=90%)
        run: task lint:cmderr-coverage

      - name: Phase 1 golden smoke
        run: task test:golden -- --filter '_file_not_found|_invalid_|_unsupported|_conflict'

  lint-help:
    name: help docstring lint
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint cobra help strings
        run: task lint:help

  lint-coverage:
    name: coverage gate (pkg/ + internal/cli/)
    runs-on: ubuntu-latest
    needs: quality-check
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run dual-rule coverage gate
        run: task lint:coverage
